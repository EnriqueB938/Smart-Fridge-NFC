<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo oscuro a juego con tu interfaz -->
  <rect width="512" height="512" rx="110" fill="#202124"/>
  
  <!-- Contorno minimalista de la nevera en amarillo -->
  <rect x="156" y="106" width="200" height="300" rx="24" fill="none" stroke="#FFD700" stroke-width="28"/>
  
  <!-- Separador de las puertas de la nevera -->
  <line x1="156" y1="216" x2="356" y2="216" stroke="#FFD700" stroke-width="28"/>
  
  <!-- Tiradores de las puertas -->
  <line x1="190" y1="130" x2="190" y2="180" stroke="#FFD700" stroke-width="16" stroke-linecap="round"/>
  <line x1="190" y1="250" x2="190" y2="330" stroke="#FFD700" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Ondas NFC en la parte inferior -->
  <path d="M 230 300 Q 256 280 282 300" fill="none" stroke="#FFD700" stroke-width="20" stroke-linecap="round"/>
  <path d="M 210 340 Q 256 300 302 340" fill="none" stroke="#FFD700" stroke-width="20" stroke-linecap="round"/>
</svg>
